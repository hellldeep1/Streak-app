<!DOCTYPE html>
<html>
<head>
  <title>Streak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system;
      background: #000;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .streak {
      text-align: center;
      font-size: 40px;
      margin-bottom: 20px;
    }

    .card {
      background: #111;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-top: 20px;
    }

    .day {
      padding-top: 100%;
      border-radius: 6px;
      position: relative;
      background: #1a1a1a;
    }

    .day.green { background: #22c55e; }
    .day.red { background: #ef4444; }

    .day span {
      position: absolute;
      bottom: 5px;
      right: 5px;
      font-size: 10px;
    }

    .log {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

  </style>
</head>
<body>

<h1>🔥 Streak</h1>
<div class="streak" id="streak">0</div>

<div class="card" onclick="logTask('wake')">Wake up</div>
<div class="card" onclick="logTask('workout')">Workout</div>
<div class="card" onclick="logTask('walk')">Walk</div>
<div class="card" onclick="logTask('eat')">Eat</div>

<div class="calendar" id="calendar"></div>

<div class="log" id="log"></div>

<script>
let data = JSON.parse(localStorage.getItem("tracker")) || { days:{} };

const today = new Date().toISOString().split("T")[0];

if (!data.days[today]) {
  data.days[today] = {};
}

function logTask(task) {
  const time = new Date().toLocaleTimeString();
  data.days[today][task] = time;
  update();
}

function isComplete(day) {
  return day.wake && day.workout && day.walk && day.eat;
}

function getStreak() {
  let streak = 0;
  const dates = Object.keys(data.days).sort().reverse();

  for (let d of dates) {
    if (isComplete(data.days[d])) streak++;
    else break;
  }
  return streak;
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  Object.keys(data.days).slice(-28).forEach(d => {
    const div = document.createElement("div");
    div.className = "day";

    if (isComplete(data.days[d])) div.classList.add("green");
    else if (Object.keys(data.days[d]).length > 0) div.classList.add("red");

    const span = document.createElement("span");
    span.innerText = d.split("-")[2];
    div.appendChild(span);

    div.onclick = () => showLog(d);

    cal.appendChild(div);
  });
}

function showLog(date) {
  const logs = data.days[date];
  let text = "📅 " + date + "<br>";

  for (let key in logs) {
    text += key + ": " + logs[key] + "<br>";
  }

  document.getElementById("log").innerHTML = text;
}

function update() {
  localStorage.setItem("tracker", JSON.stringify(data));
  document.getElementById("streak").innerText = getStreak();
  renderCalendar();
}

update();
</script>

</body>
</html>
