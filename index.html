<!DOCTYPE html>
<html>
<head>
  <title>Streak</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont;
      background: #000;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: auto;
    }

    h1 {
      text-align: center;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .streak {
      text-align: center;
      font-size: 48px;
      margin-bottom: 30px;
      font-weight: 500;
    }

    .card {
      background: #111;
      border-radius: 16px;
      padding: 15px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .label {
      font-size: 17px;
    }

    .toggle {
      width: 50px;
      height: 28px;
      border-radius: 20px;
      background: #333;
      position: relative;
      transition: 0.3s;
    }

    .toggle.active {
      background: #22c55e;
    }

    .toggle::after {
      content: "";
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: 0.3s;
    }

    .toggle.active::after {
      left: 24px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 25px;
    }

    .day {
      width: 100%;
      padding-top: 100%;
      border-radius: 6px;
      background: #1a1a1a;
    }

    .green { background: #22c55e; }
    .red { background: #ef4444; }

  </style>
</head>
<body>

<div class="container">

<h1>🔥 Streak</h1>
<div class="streak" id="streak">0</div>

<div class="card" onclick="toggle('wake')">
  <div class="label">Wake up</div>
  <div class="toggle" id="wake"></div>
</div>

<div class="card" onclick="toggle('workout')">
  <div class="label">Workout</div>
  <div class="toggle" id="workout"></div>
</div>

<div class="card" onclick="toggle('walk')">
  <div class="label">Walk</div>
  <div class="toggle" id="walk"></div>
</div>

<div class="card" onclick="toggle('eat')">
  <div class="label">Eat</div>
  <div class="toggle" id="eat"></div>
</div>

<div class="calendar" id="calendar"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("tracker")) || {
  days: {},
  streak: 0
};

const today = new Date().toISOString().split("T")[0];

if (!data.days[today]) {
  data.days[today] = { wake:false, workout:false, walk:false, eat:false };
}

function toggle(task) {
  data.days[today][task] = !data.days[today][task];
  updateUI();
}

function isComplete(d) {
  return d.wake && d.workout && d.walk && d.eat;
}

function calculateStreak() {
  let streak = 0;
  const dates = Object.keys(data.days).sort().reverse();

  for (let d of dates) {
    if (isComplete(data.days[d])) streak++;
    else break;
  }
  data.streak = streak;
}

function renderCalendar() {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  Object.keys(data.days).slice(-28).forEach(d => {
    const div = document.createElement("div");
    div.className = "day";

    if (isComplete(data.days[d])) div.classList.add("green");
    else if (Object.values(data.days[d]).some(v => v)) div.classList.add("red");

    cal.appendChild(div);
  });
}

function updateUI() {
  calculateStreak();

  document.getElementById("streak").innerText = data.streak;

  ["wake","workout","walk","eat"].forEach(t => {
    const el = document.getElementById(t);
    el.classList.toggle("active", data.days[today][t]);
  });

  renderCalendar();
  localStorage.setItem("tracker", JSON.stringify(data));
}

updateUI();
</script>

</body>
</html>
